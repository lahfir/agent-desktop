name: Supply Chain

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '37 9 * * 1'
  workflow_dispatch:

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check release metadata consistency
        run: scripts/check-release-consistency.sh

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Check npm package and publish policy
        run: node scripts/check-npm-package.js

      - name: Cargo dependency policy
        uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19
        with:
          command: check
          arguments: --locked
          command-arguments: advisories licenses bans sources

      - name: Workflow security audit
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: 1.25.2
          persona: regular
          min-severity: medium
          min-confidence: high
          advanced-security: false
          inputs: .github/workflows
